<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC Daily</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1117;
  --bg2: #161820;
  --bg3: #1e2030;
  --bg4: #252840;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text2: #9399b2;
  --text3: #565f89;
  --blue: #7aa2f7;
  --blue-dim: rgba(122,162,247,0.15);
  --green: #9ece6a;
  --green-dim: rgba(158,206,106,0.15);
  --purple: #bb9af7;
  --purple-dim: rgba(187,154,247,0.15);
  --orange: #ff9e64;
  --orange-dim: rgba(255,158,100,0.15);
  --red: #f7768e;
  --red-dim: rgba(247,118,142,0.15);
  --teal: #73daca;
  --teal-dim: rgba(115,218,202,0.15);
  --yellow: #e0af68;
  --yellow-dim: rgba(224,175,104,0.15);
  --radius: 12px;
  --radius-sm: 8px;
  --sidebar-w: 220px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; font-size: 14px; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 20px 0; gap: 4px;
  overflow-y: auto;
}
.sidebar-logo {
  padding: 0 18px 20px;
  font-size: 18px; font-weight: 600; color: var(--blue);
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.sidebar-logo span { font-size: 22px; }
.sidebar-section { padding: 6px 18px 2px; font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 1.2px; text-transform: uppercase; margin-top: 8px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 18px; cursor: pointer;
  color: var(--text2); font-size: 13.5px; font-weight: 400;
  border-radius: 0; transition: all 0.15s;
  position: relative; margin: 0 8px; border-radius: var(--radius-sm);
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--blue-dim); color: var(--blue); font-weight: 500; }
.nav-item .nav-icon { width: 18px; text-align: center; font-size: 16px; }
.nav-item .badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; }
.sidebar-bottom {
  margin-top: auto; padding: 16px;
  border-top: 1px solid var(--border);
}
.streak-card {
  background: linear-gradient(135deg, rgba(255,158,100,0.2), rgba(247,118,142,0.15));
  border: 1px solid rgba(255,158,100,0.3);
  border-radius: var(--radius-sm); padding: 12px;
}
.streak-num { font-size: 28px; font-weight: 700; color: var(--orange); line-height: 1; }
.streak-label { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg2);
}
.page-title { font-size: 18px; font-weight: 600; color: var(--text); }
.page-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.xp-pill {
  background: var(--yellow-dim); border: 1px solid rgba(224,175,104,0.3);
  padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600; color: var(--yellow);
}
.level-pill {
  background: var(--purple-dim); border: 1px solid rgba(187,154,247,0.3);
  padding: 6px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 600; color: var(--purple);
}
.content { flex: 1; overflow-y: auto; padding: 24px 28px; }
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 2px; }

/* CARDS */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.card-sm { padding: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }

/* STAT CARD */
.stat-card {
  border-radius: var(--radius); padding: 18px;
  display: flex; flex-direction: column; gap: 8px;
}
.stat-icon { font-size: 22px; }
.stat-val { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 12px; color: var(--text2); }
.stat-sub { font-size: 11px; color: var(--text3); }

/* PROGRESS BAR */
.progress-wrap { background: var(--bg4); border-radius: 6px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 6px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

/* BUTTONS */
.btn { padding: 9px 18px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.btn-primary { background: var(--blue); color: #1a1b26; }
.btn-primary:hover { background: #89b4fa; transform: translateY(-1px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-ghost { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { background: var(--bg4); color: var(--text); }
.btn-green { background: var(--green); color: #1a1b26; }
.btn-green:hover { background: #b9f27c; }
.btn-red { background: var(--red); color: #fff; }
.btn-orange { background: var(--orange); color: #1a1b26; }

/* FLASHCARD */
.flashcard-scene { perspective: 1000px; cursor: pointer; user-select: none; }
.flashcard-card {
  width: 100%; height: 220px;
  position: relative; transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(.4,0,.2,1);
}
.flashcard-card.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; border: 1px solid var(--border2);
}
.fc-front { background: linear-gradient(135deg, var(--bg3), var(--bg4)); }
.fc-back { background: linear-gradient(135deg, rgba(122,162,247,0.1), rgba(187,154,247,0.1)); transform: rotateY(180deg); border-color: rgba(122,162,247,0.3); }
.fc-word { font-size: 36px; font-weight: 700; color: var(--text); }
.fc-type { font-size: 12px; color: var(--blue); background: var(--blue-dim); padding: 2px 10px; border-radius: 10px; margin-top: 8px; }
.fc-meaning { font-size: 24px; font-weight: 600; color: var(--blue); text-align: center; }
.fc-phonetic { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text3); margin-top: 6px; }
.fc-example { font-size: 13px; color: var(--text2); margin-top: 12px; text-align: center; font-style: italic; line-height: 1.5; }

/* MC OPTIONS */
.mc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
.mc-opt {
  padding: 12px 16px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); cursor: pointer;
  font-size: 13px; color: var(--text2); background: var(--bg3);
  transition: all 0.15s; display: flex; align-items: center; gap: 10px;
}
.mc-opt:hover:not(.disabled) { border-color: var(--blue); color: var(--text); background: var(--blue-dim); }
.mc-opt.correct { border-color: var(--green); background: var(--green-dim); color: var(--green); }
.mc-opt.wrong { border-color: var(--red); background: var(--red-dim); color: var(--red); }
.mc-opt.disabled { cursor: default; }
.mc-label { width: 22px; height: 22px; border-radius: 6px; background: var(--bg4); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }

/* EXPLANATION BOX */
.explain-box {
  margin-top: 16px; padding: 14px;
  background: rgba(122,162,247,0.08); border: 1px solid rgba(122,162,247,0.2);
  border-radius: var(--radius-sm); font-size: 13px; color: var(--text2); line-height: 1.6;
}

/* READING */
.reading-passage {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px;
  font-size: 13.5px; line-height: 1.8; color: var(--text2);
  max-height: 220px; overflow-y: auto;
  margin-bottom: 16px;
}
.reading-passage::-webkit-scrollbar { width: 3px; }
.reading-passage::-webkit-scrollbar-thumb { background: var(--bg4); }

/* TEXTAREA */
textarea {
  width: 100%; padding: 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: var(--bg3);
  color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif;
  resize: vertical; min-height: 80px; outline: none;
}
textarea:focus { border-color: var(--blue); }
input[type=text] {
  width: 100%; padding: 10px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border2); background: var(--bg3);
  color: var(--text); font-size: 13px; font-family: 'DM Sans', sans-serif;
  outline: none;
}
input[type=text]:focus { border-color: var(--blue); }

/* BADGE */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge-blue { background: var(--blue-dim); color: var(--blue); }
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }
.badge-orange { background: var(--orange-dim); color: var(--orange); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-teal { background: var(--teal-dim); color: var(--teal); }
.badge-yellow { background: var(--yellow-dim); color: var(--yellow); }

/* CALENDAR */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-day {
  aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 12px; cursor: pointer; font-weight: 500;
}
.cal-day.empty { cursor: default; }
.cal-day.today { border: 1px solid var(--blue); color: var(--blue); background: var(--blue-dim); }
.cal-day.done { background: var(--green-dim); color: var(--green); }
.cal-day.missed { background: var(--red-dim); color: var(--red); }
.cal-day.future { color: var(--text3); }
.cal-day.header { color: var(--text3); font-size: 11px; cursor: default; }

/* TIMER */
.timer-display {
  font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500;
  color: var(--text); text-align: center; padding: 12px;
  background: var(--bg3); border-radius: var(--radius-sm);
}
.timer-display.warning { color: var(--red); }

/* DICT */
.dict-result { margin-top: 16px; }
.dict-word-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }
.dict-word { font-size: 28px; font-weight: 700; }
.dict-phonetic { font-family: 'DM Mono', monospace; font-size: 14px; color: var(--text3); }
.dict-pos { font-size: 12px; color: var(--blue); background: var(--blue-dim); padding: 2px 10px; border-radius: 10px; }
.dict-meaning { font-size: 15px; font-weight: 500; color: var(--text); margin: 10px 0 6px; }
.dict-example { font-size: 13px; color: var(--text2); font-style: italic; padding-left: 12px; border-left: 2px solid var(--border2); line-height: 1.5; }
.dict-vn { font-size: 13px; color: var(--teal); margin-top: 6px; }
.dict-divider { height: 1px; background: var(--border); margin: 14px 0; }

/* ROADMAP */
.roadmap-week { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 12px; }
.roadmap-week-header { padding: 12px 16px; background: var(--bg3); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.roadmap-days { display: grid; grid-template-columns: repeat(7,1fr); }
.roadmap-day { padding: 10px; border-right: 1px solid var(--border); text-align: center; }
.roadmap-day:last-child { border-right: none; }
.roadmap-day-num { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
.roadmap-day-topic { font-size: 10px; color: var(--text2); line-height: 1.3; }
.roadmap-day.done .roadmap-day-num { color: var(--green); }
.roadmap-day.today { background: var(--blue-dim); }
.roadmap-day.today .roadmap-day-num { color: var(--blue); }

/* SECTION HEADER */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 15px; font-weight: 600; color: var(--text); }
.section-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* SPINNER */
.spinner { width: 18px; height: 18px; border: 2px solid var(--border2); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TABS (sub) */
.sub-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--bg3); padding: 4px; border-radius: var(--radius-sm); }
.sub-tab { flex: 1; padding: 7px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12.5px; font-weight: 500; font-family: 'DM Sans', sans-serif; background: transparent; color: var(--text3); transition: all 0.15s; text-align: center; }
.sub-tab.active { background: var(--bg2); color: var(--text); }

/* MODULE DONE */
.module-done { text-align: center; padding: 32px 20px; }
.module-done-icon { font-size: 48px; margin-bottom: 12px; }
.module-done-title { font-size: 18px; font-weight: 600; color: var(--green); margin-bottom: 6px; }
.module-done-sub { font-size: 13px; color: var(--text3); }

/* LOADING OVERLAY */
#loading-overlay {
  position: fixed; inset: 0; background: var(--bg); display: flex;
  align-items: center; justify-content: center; flex-direction: column; gap: 16px; z-index: 1000;
}
.load-logo { font-size: 32px; font-weight: 700; color: var(--blue); }
.load-sub { font-size: 13px; color: var(--text3); }

/* RESPONSIVE */
@media (max-width: 900px) {
  .sidebar { width: 60px; min-width: 60px; }
  .sidebar-logo span:last-child, .nav-item > span:not(.nav-icon), .sidebar-section, .streak-card .streak-label, .streak-num { display: none; }
  .nav-item { justify-content: center; margin: 0 4px; }
  .sidebar-bottom { padding: 8px; }
}

/* MISC */
.flex { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }
.gap-20 { gap: 20px; }
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mt-20 { margin-top: 20px; }
.mb-8 { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }
.text-center { text-align: center; }
.text-right { text-align: right; }
.ml-auto { margin-left: auto; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }
hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════
const ST = {
  async g(k){
    // Try window.storage (Claude artifact), fallback to localStorage
    try {
      if(window.storage){const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}
    } catch{}
    try {const r=localStorage.getItem(k);return r?JSON.parse(r):null;} catch{return null;}
  },
  async s(k,v){
    try {
      if(window.storage){await window.storage.set(k,JSON.stringify(v));}
    } catch{}
    try {localStorage.setItem(k,JSON.stringify(v));} catch{}
  },
  async d(k){
    try{if(window.storage)await window.storage.delete(k);}catch{}
    try{localStorage.removeItem(k);}catch{}
  }
};

// ═══════════════════════════════════════════════════════════════
// CURRICULUM — 30 topics with full lesson data, cycling for 365 days
// ═══════════════════════════════════════════════════════════════
const TOPICS = [
  "Office & Workplace","Business Travel","Finance & Banking","Human Resources","Marketing & Sales",
  "Technology & IT","Customer Service","Health & Safety","Environment","Management",
  "Contracts & Legal","Supply Chain","Manufacturing","Retail & Commerce","Real Estate",
  "Education & Training","Media & Communication","Research & Development","Accounting","Logistics",
  "Insurance","Investment","Entrepreneurship","Hospitality","Food & Beverage",
  "Healthcare","Architecture","Energy","Agriculture","International Trade"
];

function buildLesson(dayNum) {
  const topicIdx = (dayNum - 1) % TOPICS.length;
  const topic = TOPICS[topicIdx];
  const difficulty = Math.min(5, Math.floor((dayNum - 1) / 30) + 1);
  const seed = dayNum * 7919 % 10000;

  // Vocab pools per topic
  const vocabPool = {
    "Office & Workplace": [
      {w:"schedule",t:"v/n",m:"lên lịch / lịch trình",ph:"/ˈskedʒuːl/",ex:"Please schedule a meeting for Monday morning.",vn:"Vui lòng lên lịch họp vào sáng thứ Hai."},
      {w:"deadline",t:"n",m:"hạn chót",ph:"/ˈdedlaɪn/",ex:"The deadline for submitting reports is Friday.",vn:"Hạn nộp báo cáo là thứ Sáu."},
      {w:"colleague",t:"n",m:"đồng nghiệp",ph:"/ˈkɒliːɡ/",ex:"My colleague helped me finish the project.",vn:"Đồng nghiệp đã giúp tôi hoàn thành dự án."},
      {w:"approve",t:"v",m:"phê duyệt",ph:"/əˈpruːv/",ex:"The manager needs to approve this request.",vn:"Quản lý cần phê duyệt yêu cầu này."},
      {w:"confirm",t:"v",m:"xác nhận",ph:"/kənˈfɜːrm/",ex:"Please confirm your attendance via email.",vn:"Vui lòng xác nhận tham dự qua email."},
      {w:"document",t:"n",m:"tài liệu",ph:"/ˈdɒkjumənt/",ex:"Sign the document and return it today.",vn:"Ký tài liệu và trả lại hôm nay."},
      {w:"available",t:"adj",m:"rảnh / có sẵn",ph:"/əˈveɪləbl/",ex:"Are you available for a call at 3pm?",vn:"Bạn có rảnh để nghe điện thoại lúc 3 giờ không?"},
      {w:"submit",t:"v",m:"nộp",ph:"/səbˈmɪt/",ex:"Please submit your report before noon.",vn:"Vui lòng nộp báo cáo trước buổi trưa."},

  return {topic, difficulty, vocab, grammar, reading: readings[0], writing};
}

function goto(page) {
  if(examTimer&&page!=='exam'){clearInterval(examTimer);examTimer=null;}
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.page===page));
  document.getElementById('page-title').textContent = pageInfo[page].title;
  document.getElementById('page-sub').textContent = pageInfo[page].sub();
  render();
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  const c = document.getElementById('content');
  if(!c) return;
  const pages = {dashboard:renderDashboard,vocab:renderVocab,grammar:renderGrammar,reading:renderReading,writing:renderWriting,dict:renderDict,exam:renderExam,roadmap:renderRoadmap};
  c.innerHTML = (pages[currentPage]||renderDashboard)();
}

function doDict() {
  const input = document.getElementById('dict-input');
  if(!input) return;
  const q = input.value.trim().toLowerCase();
  if(!q) return;
  window._dictQuery = q;
  const found = DICT[q];
  if(found) {
    window._dictResult = found;
  } else {
    // Generate basic result for unknown words
    window._dictResult = {
      word:q, phonetic:'/ - /',
      entries:[{pos:'unknown',meaning:`Từ "${q}" chưa có trong database. Hãy thử: schedule, deadline, revenue, negotiate, implement, efficient`,examples:[]}],
      synonyms:null, related:null
    };
  }
  render();
}

function startExam(type) {
  const questions = type==='mini' ? MINI_EXAM.questions :
    FULL_EXAM.parts.flatMap(p=>p.questions);
  const timeLimit = type==='mini' ? MINI_EXAM.time : FULL_EXAM.time;
  examState = {type, questions, timeLimit, timeLeft:timeLimit, current:0, answers:[], finished:false, startTime:Date.now()};
  if(examTimer) clearInterval(examTimer);
  examTimer = setInterval(()=>{
    examState.timeLeft--;
    if(examState.timeLeft<=0){clearInterval(examTimer);finishExam();}
    else {
      const td=document.getElementById('exam-timer');
      if(td){const m=Math.floor(examState.timeLeft/60);const s=examState.timeLeft%60;td.textContent=`${m}:${s.toString().padStart(2,'0')}`;td.className='timer-display'+(examState.timeLeft<60?' warning':'');}
    }
  },1000);
  render();
}

    <span style="font-size:13px;color:var(--text3)">Câu ${es.current+1}/${es.questions.length}</span>
  </div>
  <div class="timer-display${es.timeLeft<60?' warning':''}" id="exam-timer" style="padding:8px 16px;font-size:18px">${m}:${s.toString().padStart(2,'0')}</div>
</div>
<div class="progress-wrap mb-16" style="height:6px"><div class="progress-fill" style="width:${es.current/es.questions.length*100}%;background:var(--blue)"></div></div>
<div class="card">
  <div style="background:var(--bg3);border-radius:8px;padding:16px;margin-bottom:16px;font-size:14px;line-height:1.7">${q.q}</div>
  <div class="mc-grid">
    ${q.opts.map((o,i)=>{
      let cls='mc-opt';
      if(a!==undefined){cls+=' disabled';if(i===q.c)cls+=' correct';else if(i===a&&a!==q.c)cls+=' wrong';}
      return `<div class="${cls}" onclick="ansExam(${i})"><span class="mc-label">${String.fromCharCode(65+i)}</span>${o}</div>`;
    }).join('')}
  </div>
  ${a!==undefined?`<div class="explain-box mt-16">💡 ${q.exp}</div>
  <div style="display:flex;justify-content:space-between;margin-top:12px">
    <span style="font-size:12px;color:var(--text3)">Đúng ${es.answers.filter((ans,i)=>ans===es.questions[i].c).length}/${es.current+1}</span>
    ${es.current<es.questions.length-1?`<button class="btn btn-primary" onclick="nextExamQ()">Câu tiếp →</button>`:`<button class="btn btn-green" onclick="finishExam()">Nộp bài 🏆</button>`}
  </div>`:''}
</div>
<div style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap">
  ${es.questions.map((_,i)=>{
    const a2=es.answers[i];
    let bg=i===es.current?'var(--blue)':(a2!==undefined?(a2===es.questions[i].c?'var(--green)':'var(--red)'):'var(--bg3)');
    return `<div style="width:28px;height:28px;border-radius:6px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;color:${bg!=='var(--bg3)'?'#1a1b26':'var(--text3)'}" onclick="jumpExam(${i})">${i+1}</div>`;
  }).join('')}
</div>`;
}

function renderExamResult() {
  const es=examState;
  const correct=es.answers.filter((a,i)=>a===es.questions[i].c).length;
  const total=es.questions.length;
  const pct=Math.round(correct/total*100);
  const byPart={};
  es.questions.forEach((q,i)=>{
    if(!byPart[q.type]) byPart[q.type]={c:0,t:0};
    byPart[q.type].t++;
    if(es.answers[i]===q.c) byPart[q.type].c++;
  });
  return `
<div class="card text-center mb-16" style="padding:32px">
  <div style="font-size:52px;margin-bottom:12px">${pct>=80?'🏆':pct>=60?'🎯':'📚'}</div>
  <div style="font-size:28px;font-weight:700;margin-bottom:4px;color:${pct>=80?'var(--green)':pct>=60?'var(--blue)':'var(--orange)'}">${pct}%</div>
  <div style="font-size:15px;color:var(--text2)">${correct}/${total} câu đúng</div>
  <div style="font-size:13px;color:var(--text3);margin-top:6px">${pct>=80?'Xuất sắc! Bạn đã nắm vững phần này':pct>=60?'Khá tốt! Cần ôn lại một số phần':'Cần luyện tập thêm. Đừng nản lòng!'}</div>
</div>
<div class="grid-3 gap-16 mb-16">
  ${Object.entries(byPart).map(([part,s])=>`
  <div class="stat-card" style="background:var(--bg2);border:1px solid var(--border)">
    <span class="badge badge-${part==='Part5'?'blue':part==='Part6'?'purple':'teal'}" style="width:fit-content">${part}</span>
    <div class="stat-val" style="color:${s.c/s.t>=0.7?'var(--green)':'var(--orange)'}">${Math.round(s.c/s.t*100)}%</div>
    <div class="stat-label">${s.c}/${s.t} đúng</div>
  </div>`).join('')}
</div>
<div class="card mb-16">
  <div class="section-title mb-12">📋 Chi tiết từng câu</div>
  ${es.questions.map((q,i)=>{
    const correct2=es.answers[i]===q.c;
    const userAns=es.answers[i]!==undefined?q.opts[es.answers[i]]:'(Chưa trả lời)';
    return `<div style="border-radius:10px;margin-bottom:10px;overflow:hidden;border:1px solid ${correct2?'rgba(158,206,106,0.25)':'rgba(247,118,142,0.25)'}">
      <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:${correct2?'rgba(158,206,106,0.07)':'rgba(247,118,142,0.07)'}">
        <span style="font-size:16px;flex-shrink:0;margin-top:1px">${correct2?'✅':'❌'}</span>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;background:${q.type==='Part5'?'var(--blue-dim)':q.type==='Part6'?'var(--purple-dim)':'var(--teal-dim)'};color:${q.type==='Part5'?'var(--blue)':q.type==='Part6'?'var(--purple)':'var(--teal)'}">${q.type}</span>
            <span style="font-size:11px;color:var(--text3)">Câu ${i+1}</span>
          </div>
          <div style="font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.5">${q.q}</div>
          <div style="display:flex;gap:16px;flex-wrap:wrap">
            <div style="font-size:12px"><span style="color:var(--text3)">Bạn chọn: </span><span style="font-weight:500;color:${correct2?'var(--green)':'var(--red)'}">${userAns}</span></div>
            ${!correct2?`<div style="font-size:12px"><span style="color:var(--text3)">Đáp án đúng: </span><span style="color:var(--green);font-weight:500">${q.opts[q.c]}</span></div>`:''}
          </div>
        </div>
      </div>
      ${!correct2&&(q.wrong||q.why||q.fix)?`
      <div style="padding:12px 14px;background:var(--bg3);border-top:1px solid rgba(247,118,142,0.2)">
        ${q.wrong?`<div style="margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:var(--red);letter-spacing:0.5px;margin-bottom:5px;display:flex;align-items:center;gap:6px">
            <span>⚠️</span> SAI Ở ĐÂU
          </div>
          <div style="font-size:12.5px;color:var(--text2);line-height:1.6;padding-left:4px">${q.wrong}</div>
        </div>`:''}
        ${q.why?`<div style="margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:var(--yellow);letter-spacing:0.5px;margin-bottom:5px;display:flex;align-items:center;gap:6px">
            <span>💡</span> TẠI SAO
          </div>
          <div style="font-size:12.5px;color:var(--text2);line-height:1.6;padding-left:4px">${q.why}</div>
        </div>`:''}
        ${q.fix?`<div>
          <div style="font-size:11px;font-weight:700;color:var(--green);letter-spacing:0.5px;margin-bottom:5px;display:flex;align-items:center;gap:6px">
            <span>✅</span> SỬA LẠI THẾ NÀO
          </div>
          <div style="font-size:12.5px;color:var(--text2);line-height:1.6;padding-left:4px">${q.fix}</div>
        </div>`:''}
      </div>`:''}
    </div>`;
  }).join('')}
</div>
<div style="display:flex;gap:10px;justify-content:center">
  <button class="btn btn-ghost" onclick="examState=null;render()">← Về menu đề thi</button>
  <button class="btn btn-primary" onclick="startExam(examState.type)">Thi lại</button>
</div>`;
}

function ansExam(i) {
  if(examState.answers[examState.current]!==undefined) return;
  examState.answers[examState.current]=i;
  render();
}
function nextExamQ(){examState.current++;render();}
function jumpExam(i){examState.current=i;render();}
function finishExam(){
  clearInterval(examTimer);examTimer=null;
  examState.finished=true;
  const correct=examState.answers.filter((a,i)=>a===examState.questions[i].c).length;
  if(!window._examHistory) window._examHistory=[];
  window._examHistory.push({type:examState.type,score:correct,total:examState.questions.length,date:TODAY});
  P.xp += correct*15;
  ST.s('toeic_p',P);
  render();
}

// ── ROADMAP ──────────────────────────────────────────────────
function renderRoadmap() {
  const now=new Date(); const year=now.getFullYear(); const month=now.getMonth();
  const tabs=['Theo tháng','Theo tuần','Lộ trình năm'];
  if(!window._roadmapTab) window._roadmapTab=0;
  const t=window._roadmapTab;

  let content='';
  if(t===0) content=renderRoadmapMonth(year,month);
  else if(t===1) content=renderRoadmapWeek();
  else content=renderRoadmapYear();

  return `
<div class="sub-tabs mb-16">
  ${tabs.map((tab,i)=>`<button class="sub-tab${i===t?' active':''}" onclick="window._roadmapTab=${i};render()">${tab}</button>`).join('')}
</div>
${content}`;
}

function renderRoadmapMonth(year,month){
  const monthNames=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  const days=['T2','T3','T4','T5','T6','T7','CN'];
  const firstDay=new Date(year,month,1).getDay();
  const offset=(firstDay+6)%7;
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayDate=new Date().getDate();

  return `
<div class="card mb-16">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <div class="section-title">${monthNames[month]} ${year}</div>
    <span class="badge badge-blue">Level ${P.level} — ${getLevelName(P.level)}</span>
  </div>
  <div class="cal-grid mb-8">
    ${days.map(d=>`<div class="cal-day header">${d}</div>`).join('')}
    ${Array(offset).fill('<div class="cal-day empty"></div>').join('')}
    ${Array.from({length:daysInMonth},(_,i)=>{
      const d=i+1;
      const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const hist=P.history?.[dateStr];
      const isToday=dateStr===TODAY;
      const isFuture=new Date(dateStr)>new Date(TODAY);
      let cls='cal-day';
      if(isToday) cls+=' today';
      else if(hist) cls+=' done';
      else if(isFuture) cls+=' future';
      else if(new Date(dateStr)<new Date(TODAY)) cls+=' missed';
      return `<div class="${cls}" title="${hist?TOPICS[(hist.day||1-1)%TOPICS.length]:''}">${d}</div>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:16px;font-size:12px;color:var(--text3)">
    <span>🟢 Đã học</span><span>🔵 Hôm nay</span><span>⬛ Chưa học / Chưa tới</span>
  </div>
</div>
<div class="card">
  <div class="section-title mb-12">📈 Thống kê tháng này</div>
  <div class="grid-4">
    ${[
      {label:'Ngày đã học',val:Object.keys(P.history||{}).filter(d=>d.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).length,color:'var(--green)'},
      {label:'Từ học được',val:Object.values(P.history||{}).filter(h=>h.month===month).reduce((s,h)=>s+(h.vocabCount||10),0),color:'var(--blue)'},
      {label:'Streak hiện tại',val:P.streak,color:'var(--orange)'},
      {label:'Tổng XP tháng',val:Object.values(P.history||{}).filter(h=>h.month===month).reduce((s,h)=>s+(h.xp||50),0),color:'var(--purple)'},
    ].map(s=>`<div class="stat-card" style="background:var(--bg3)"><div class="stat-val" style="color:${s.color}">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('')}
  </div>
</div>`;
}

function renderRoadmapWeek(){
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const now=new Date(); const dow=(now.getDay()+6)%7;
  const weekDates=Array.from({length:7},(_,i)=>{
    const d=new Date(now); d.setDate(now.getDate()-dow+i);
    return d.toISOString().slice(0,10);
  });
  return `
<div class="card">
  <div class="section-title mb-16">📅 Tuần này</div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">
    ${weekDates.map((date,i)=>{
      const hist=P.history?.[date];
      const isToday=date===TODAY;
      const dayNum=parseInt(date.split('-')[2]);
      return `<div style="text-align:center;padding:12px 4px;border-radius:8px;border:1px solid ${isToday?'rgba(122,162,247,0.5)':hist?'rgba(158,206,106,0.3)':'var(--border)'};background:${isToday?'var(--blue-dim)':hist?'var(--green-dim)':'var(--bg3)'}">
        <div style="font-size:11px;color:${isToday?'var(--blue)':hist?'var(--green)':'var(--text3)'};margin-bottom:4px">${days[i]}</div>
        <div style="font-size:18px;font-weight:600;color:${isToday?'var(--blue)':hist?'var(--green)':'var(--text2)'}">${dayNum}</div>
        <div style="font-size:18px;margin-top:6px">${hist?'✅':isToday?'📖':'○'}</div>
        ${hist?`<div style="font-size:10px;color:var(--text3);margin-top:4px">${hist.grammarScore||0}/5 GP</div>`:''}
      </div>`;
    }).join('')}
  </div>
</div>
<div class="card mt-16">
  <div class="section-title mb-12">🗺️ Chủ đề tuần này → tuần sau</div>
  ${Array.from({length:2},(_,w)=>`
  <div style="margin-bottom:12px">
    <div style="font-size:12px;font-weight:600;color:var(--text3);margin-bottom:8px">Tuần ${w===0?'này':'tới'}</div>
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px">
      ${Array.from({length:5},(_2,d)=>{
        const dayNum=P.day+w*7+d;
        const topic=TOPICS[(dayNum-1)%TOPICS.length];
        return `<div style="padding:8px;border-radius:6px;background:var(--bg3);font-size:11px;text-align:center;color:var(--text2)">${topic.split(' ')[0]}</div>`;
      }).join('')}
    </div>
  </div>`).join('')}
</div>`;
}

function renderRoadmapYear(){
  const months=['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'];
  const now=new Date(); const curMonth=now.getMonth();
  return `
<div class="card mb-16">
  <div class="section-title mb-12">📊 Lộ trình 12 tháng</div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
    ${months.map((m,i)=>{
      const isPast=i<curMonth; const isCur=i===curMonth;
      const daysInMonth=new Date(now.getFullYear(),i+1,0).getDate();
      const doneCount=Object.keys(P.history||{}).filter(d=>parseInt(d.split('-')[1])-1===i).length;
      const pct=isPast||isCur?Math.round(doneCount/daysInMonth*100):0;
      return `<div style="text-align:center;padding:12px;border-radius:8px;border:1px solid ${isCur?'rgba(122,162,247,0.4)':'var(--border)'};background:${isCur?'var(--blue-dim)':'var(--bg3)'}">
        <div style="font-size:13px;font-weight:600;color:${isCur?'var(--blue)':'var(--text2)'};margin-bottom:6px">${m}</div>
        ${isPast||isCur?`<div style="font-size:10px;color:var(--text3);margin-bottom:4px">${doneCount}/${daysInMonth}</div>
        <div class="progress-wrap" style="height:4px"><div class="progress-fill" style="width:${pct}%;background:${isCur?'var(--blue)':'var(--green)'}"></div></div>
        <div style="font-size:11px;color:${isCur?'var(--blue)':'var(--green)'};margin-top:4px">${pct}%</div>`:`<div style="font-size:11px;color:var(--text3)">Sắp tới</div>`}
      </div>`;
    }).join('')}
  </div>
</div>
<div class="card">
  <div class="section-title mb-12">🎯 Mục tiêu năm</div>
  ${[
    {label:'Hoàn thành tất cả 30 chủ đề TOEIC',done:P.day>=30,progress:Math.min(100,Math.round(P.day/30*100))},
    {label:'Học 1,000 từ vựng',done:P.totalWords>=1000,progress:Math.min(100,Math.round(P.totalWords/1000*100))},
    {label:'Duy trì streak 30 ngày',done:P.streak>=30,progress:Math.min(100,Math.round(P.streak/30*100))},
    {label:'Đạt Level 5 (Intermediate)',done:P.level>=5,progress:Math.min(100,Math.round(P.level/5*100))},
    {label:'Hoàn thành 50 đề thi thực hành',done:(window._examHistory||[]).length>=50,progress:Math.min(100,Math.round((window._examHistory||[]).length/50*100))},
  ].map(g=>`
  <div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
      <span style="color:${g.done?'var(--green)':'var(--text2)'}">${g.done?'✅ ':'○ '}${g.label}</span>
      <span style="color:var(--text3)">${g.progress}%</span>
    </div>
    <div class="progress-wrap" style="height:6px"><div class="progress-fill" style="width:${g.progress}%;background:${g.done?'var(--green)':'var(--blue)'}"></div></div>
  </div>`).join('')}
</div>`;
}

// ── MODULE DONE ──────────────────────────────────────────────
function moduleDone(icon,title,sub,nextPage,nextLabel) {
  return `
<div style="display:flex;align-items:center;justify-content:center;height:60vh">
  <div class="card text-center" style="max-width:400px;padding:40px">
    <div style="font-size:56px;margin-bottom:16px">${icon}</div>
    <div style="font-size:20px;font-weight:600;color:var(--green);margin-bottom:8px">${title}</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:24px">${sub}</div>
    <button class="btn btn-primary" onclick="goto('${nextPage}')">${nextLabel}</button>
  </div>
</div>`;
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function doFlip(){prog.fl=!prog.fl;render();}
async function cardAns(r){
  prog.vr.push(r);
  if(r==='k'){P.totalWords++;P.xp+=10;}
  const nx=prog.ci+1;
  if(nx<lesson.vocab.length){prog.ci=nx;prog.fl=false;}
  await save();render();
}
async function ansG(i){
  if(prog.ga!==null)return;
  prog.ga=i;
  if(i===lesson.grammar[prog.gi].c){prog.sc.g++;P.xp+=20;}
  await save();render();
}
async function nxtG(){prog.gi++;prog.ga=null;await save();render();}
async function ansR(qi,oi,c){
  if(prog.ra[qi]!==undefined)return;
  prog.ra[qi]=oi;
  if(oi===c){prog.sc.r++;P.xp+=20;}
  if(qi<lesson.reading.qs.length-1)prog.rqi=qi+1;
  await save();render();
}
function subW(){
  const txt=prog.win.trim();if(!txt)return;
  const wp=lesson.writing[prog.wi];
  const hints=wp.hint.toLowerCase().split(',').map(s=>s.trim());
  const tl=txt.toLowerCase();
  const matched=hints.filter(h=>tl.includes(h.split(' ')[0])).length;
  const ok=matched>=Math.ceil(hints.length*0.4)&&txt.length>8;
  prog.wfb={ok,msg:ok?`Câu viết hợp lý! Đã dùng ${matched}/${hints.length} từ gợi ý.`:`Thử dùng thêm các từ: ${hints.filter(h=>!tl.includes(h.split(' ')[0])).slice(0,3).join(', ')}`};
  if(ok) P.xp+=30;
  save();render();
}
async function nxtW(){prog.wi++;prog.win='';prog.wfb=null;await save();render();}

async function save(){
  await ST.s('toeic_prog_'+TODAY,prog);
  await ST.s('toeic_p',P);
  updateSidebar();
}

async function finishDay(){
  const yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  P.streak=(P.lastDate===yesterday)?(P.streak||0)+1:1;
  P.xp+=100; // bonus
  if(P.xp >= P.level*500) P.level++;
  if(!P.history) P.history={};
  P.history[TODAY]={
    day:P.day, vocabDone:true, grammarScore:prog.sc.g,
    readingScore:prog.sc.r, writingDone:true, vocabCount:lesson.vocab.length,
    xp:100, month:new Date().getMonth()
  };
  P.day++;
  P.lastDate=TODAY;
  await ST.s('toeic_p',P);
  await ST.s('toeic_prog_'+TODAY,prog);
  updateSidebar();
  alert(`🏆 Xuất sắc! Hoàn thành Ngày ${P.day-1}!\n+100 XP bonus\nStreak: ${P.streak} ngày 🔥`);
  // Reset for next day preview
  goto('dashboard');
}

function updateSidebar(){
  const se=document.getElementById('sb-streak');
  if(se) se.textContent=P.streak||1;
  const xp=document.getElementById('xp-pill');
  if(xp) xp.textContent=`⚡ ${P.xp} XP`;
  const lv=document.getElementById('level-pill');
  if(lv) lv.textContent=`🎖️ ${getLevelName(P.level)}`;
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
async function init(){
  const savedP = await ST.g('toeic_p');
  if(savedP) { Object.assign(P,savedP); }

  const dayIdx = (P.day-1) % TOPICS.length;
  lesson = buildLesson(P.day);

  const savedProg = await ST.g('toeic_prog_'+TODAY);
  if(savedProg) { Object.assign(prog,savedProg); }

  updateSidebar();
  document.getElementById('page-sub').textContent = pageInfo.dashboard.sub();
  document.getElementById('loading-overlay').style.display='none';
  render();
}

init();
</script>
